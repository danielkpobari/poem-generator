spring.application.name=Spring_AI

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# SPRING AI - GOOGLE GEMINI CONFIG
# ===============================
#
## Recommended models (you can change to gemini-2.0-flash, gemini-2.5-flash, gemini-pro, etc.)
#spring.ai.google.genai.chat.options.model=gemini-1.5-flash
spring.ai.google.genai.api-key={YOUR_GOOGLE_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.7

spring.ai.google.genai.chat.options.max-output-tokens=500

# If you want to explicitly set the chat model (good practice)
# spring.ai.model.chat=google-genai

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.yourapp=DEBUG